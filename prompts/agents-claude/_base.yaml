# _base.yaml — Universal Agent Foundation v8.7.0-candidate (Claude)
# All agent prompts implicitly inherit this file.
# Agents declare ONLY overrides and domain-specific content (primitive-diff inheritance).
# To understand an agent: read _base.yaml FIRST, then the agent file.

meta_version: "8.7.0-candidate"
concurrency_profile: "worktree"
handoff_mode: "text"

# v7.0.0 feature flags
proto_debate: true           # HAND-04 PROTO-DEBATE available (kernel-ops.md §HAND-04)
dynamic_replan: true         # BLOCKED_REPLAN_REQUIRED status active (kernel-workflow.md §DYNAMIC-REPLANNING)
context_condensation: true   # OP-CONDENSE trigger active (kernel-ops.md §OP-CONDENSE)
evaluation_mode: "rubric"    # ConsistencyAuditor uses R1-R4 rubric ≥80 PASS (kernel-roles.md §EVALUATOR-OPTIMIZER)
max_replan_cycles: 2         # AP-12: 3rd cycle → mandatory user escalation

# v7.1.0 feature flags
id_namespace_binding: true   # CHK/ASM/KL IDs use {family}-{id_prefix}-NNN form (kernel-ops.md §ID NAMESPACE OPERATIONS)

# v8.0.0-candidate feature flags
skill_capsules: true
token_telemetry: true
adaptive_condensation: true
agent_effort_policy: true
tool_trust_boundary: true
artifact_convergence: true

wiki_memory:
  retrieval_gate: "Hard/investigative/precedent-likely? Search docs/wiki/ or ask Librarian; record hit/no-hit."
  compile_gate: "Before SUCCESS, K-COMPILE important validated findings; unvalidated findings become artifacts/K candidates."

axioms: "A1–A11 unconditional (docs/00_GLOBAL_RULES.md §A) — SSoT: kernel-constitution.md"
project_rules: "PR-1–PR-6 (docs/03_PROJECT_RULES.md — SSoT: kernel-project.md)"

dirs:
  lib:     "src/research/"
  exp:     "analysis/{study}/"
  results: "analysis/{study}/results/{name}/"
  graphs:  "analysis/{study}/results/{name}/ — PDF only"
  meta:    "prompts/meta/"
  agents:  "prompts/agents-claude/"
  skills:  "prompts/skills/"
  memo:    "docs/memo/"
  wiki:    "docs/wiki/"
  locks:   "docs/locks/"

primitives_default:
  classify_before_act: true
  scope_creep: reject
  uncertainty_action: stop
  evidence_required: always
  tool_delegate_numerics: true

rules_always:
  - STOP_CONDITIONS           # kernel-ops.md §STOP CONDITIONS
  - DOM-02_CONTAMINATION_GUARD
  - SCOPE_BOUNDARIES
  - BRANCH_LOCK_CHECK         # read ACTIVE_LEDGER §4 + docs/locks/ before any write
  - ID_NAMESPACE_BIND         # v7.1.0: derive id_prefix once at session start; carry in all HAND-01 dispatches; immutable thereafter
  - WIKI_RETRIEVAL_GATE       # search docs/wiki/ before difficult/investigative/precedent-likely work
  - WIKI_COMPILE_GATE         # compile significant validated findings or reusable lessons

on_demand_common:
  HAND-01:           "kernel-ops.md §HAND-01"
  HAND-02:           "kernel-ops.md §HAND-02"
  HAND-03:           "kernel-ops.md §HAND-03"
  HAND-04:           "kernel-ops.md §HAND-04"        # v7.0.0
  OP-CONDENSE:       "kernel-ops.md §OP-CONDENSE"    # v7.0.0
  GIT-SP:            "kernel-ops.md §GIT-SP"
  GIT-WORKTREE-ADD:  "kernel-ops.md §GIT-WORKTREE-ADD"
  GIT-ATOMIC-PUSH:   "kernel-ops.md §GIT-ATOMIC-PUSH"
  LOCK:              "kernel-ops.md §LOCK-ACQUIRE"
  UNLOCK:            "kernel-ops.md §LOCK-RELEASE"
  ID-NAMESPACE-DERIVE: "kernel-ops.md §ID-NAMESPACE-DERIVE"   # v7.1.0
  ID-RESERVE-LOCAL:    "kernel-ops.md §ID-RESERVE-LOCAL"     # v7.1.0
  ID-COLLISION-CHECK:  "kernel-ops.md §ID-COLLISION-CHECK"   # v7.1.0
  HAND_SCHEMA:       "kernel-roles.md §SCHEMA-IN-CODE"
  HAND_SCHEMA_V710:  "kernel-roles.md §SCHEMA EXTENSIONS v7.1.0"  # v7.1.0
  HAND_SCHEMA_V800:  "kernel-roles.md §SCHEMA EXTENSIONS v8.0.0-candidate"
  METRIC-01:         "kernel-ops.md §METRIC-01"
  TOOL-TRUST-01:     "kernel-ops.md §TOOL-TRUST-01"
  ARTIFACT-CONVERGENCE: "kernel-ops.md §ARTIFACT-CONVERGENCE-01"
  K-RETRIEVE:        "kernel-ops.md §K-RETRIEVE"
  K-COMPILE:         "kernel-ops.md §K-COMPILE"
  K-LINT:            "kernel-ops.md §K-LINT"
  SCHEME-CODE-01:    "kernel-ops.md §SCHEME-CODE-01"
  PAPER-WRITE-01:    "kernel-ops.md §PAPER-WRITE-01"
  PRESENTATION-GEN-01: "kernel-ops.md §PRESENTATION-GEN-01"
  VISUAL-CONCEPT-01: "kernel-ops.md §VISUAL-CONCEPT-01"
  SKILL-HANDOFF-AUDIT: "prompts/skills/SKILL-HANDOFF-AUDIT.md"
  SKILL-GIT-WORKTREE: "prompts/skills/SKILL-GIT-WORKTREE.md"
  SKILL-PROMPT-AUDIT: "prompts/skills/SKILL-PROMPT-AUDIT.md"
  SKILL-CONDENSE-V2:  "prompts/skills/SKILL-CONDENSE-V2.md"
  SKILL-TOOL-TRUST:   "prompts/skills/SKILL-TOOL-TRUST.md"
  SKILL-PAPER-WRITING: "prompts/skills/SKILL-PAPER-WRITING.md"
  SKILL-SCHEME-CODE:   "prompts/skills/SKILL-SCHEME-CODE.md"
  SKILL-PRESENTATION-DECK: "prompts/skills/SKILL-PRESENTATION-DECK.md"
  SKILL-PRESENTATION-ILLUSTRATION: "prompts/skills/SKILL-PRESENTATION-ILLUSTRATION.md"

procedure_pre:
  - "HAND-03() — run 7-check acceptance before any work"
  - "DOM-02 write scope check before any file write"
  - "LOCK(branch) if concurrency_profile == worktree and task writes — STOP-10 on collision"

procedure_post:
  - "METRIC-01 token_telemetry when DISPATCH asks or prompt generation runs"
  - "CoVe (kernel-roles.md §COVE MANDATE) before HAND-02 — Specialists only"
  - "HAND-02(status, produced) — emit RETURN"
  - "UNLOCK(branch) on SUCCESS or terminal FAIL; retain lock only with explicit retry rationale"

recovery: "kernel-workflow.md §STOP-RECOVER MATRIX"
